name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Upload APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Locate and Rename APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: No APK file found in app/build/outputs/apk/release/"
            exit 1
          fi
          echo "Found APK at $APK_PATH"
          mv "$APK_PATH" "app/build/outputs/apk/release/expense-tracker-${{ github.ref_name }}.apk"
        shell: bash

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/expense-tracker-${{ github.ref_name }}.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
